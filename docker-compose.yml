networks:
  voicesplit_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

services:
  # ─────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - voicesplit_network
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - voicesplit_network
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────
  # MinIO
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - voicesplit_network
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────
  # Backend (FastAPI)
  # ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile

    image: voicesplit-backend:latest
    restart: unless-stopped
    env_file: .env

    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}

    volumes:
      - ./backend:/app

    networks:
      - voicesplit_network

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

    ports:
      - "8000:8000"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - "2"

  # ─────────────────────────────────────────────
  # Celery Worker
  # ─────────────────────────────────────────────
  worker:
    image: voicesplit-backend:latest
    restart: unless-stopped
    env_file: .env

    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}

    volumes:
      - ./backend:/app

    networks:
      - voicesplit_network

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      backend:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A app.workers.celery_app inspect ping -d celery@$$HOSTNAME || exit 1",
        ]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 60s

    command:
      - celery
      - -A
      - app.workers.celery_app
      - worker
      - --loglevel=info
      - --concurrency=2

  # ─────────────────────────────────────────────
  # Frontend (Next.js)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
        INTERNAL_API_URL: ${INTERNAL_API_URL}

    image: voicesplit-frontend:latest
    restart: unless-stopped

    env_file: .env

    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      INTERNAL_API_URL: ${INTERNAL_API_URL}

    ports:
      - "3000:3000"

    networks:
      - voicesplit_network

    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/auth/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ─────────────────────────────────────────────
  # Nginx
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    ports:
      - "80:80"
      - "443:443"

    networks:
      - voicesplit_network

    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s